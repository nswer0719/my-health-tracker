<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>健康體態 Pro+ 專業營養佔比版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { background-color: #f8fafc; color: #1e293b; padding-top: calc(1rem + var(--sat)); padding-bottom: calc(5rem + var(--sab)); transition: all 0.3s ease; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .card { background: white; border-radius: 32px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04); border: 1px solid rgba(226, 232, 240, 0.8); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        input, select { background-color: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; font-weight: 600; }
        .dark input, .dark select { background-color: #334155; color: #f1f5f9; border-color: #475569; }
        .nav-active { color: #3b82f6 !important; font-weight: 900; transform: translateY(-3px); }
        .suggestion-box { position: absolute; width: 100%; max-height: 400px; overflow-y: auto; background: white; border-radius: 20px; z-index: 100; margin-top: 8px; border: 1px solid #e2e8f0; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
        .dark .suggestion-box { background: #1e293b; border-color: #475569; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .meal-header { border-left: 6px solid #3b82f6; padding-left: 12px; margin: 24px 0 12px 0; font-size: 15px; font-weight: 900; color: #3b82f6; }
        .macro-label { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 8px; }
        .ratio-display { font-size: 11px; font-weight: 900; letter-spacing: 0.5px; }
    </style>
</head>
<body class="px-6">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center py-6 mb-4">
            <div>
                <h1 class="text-3xl font-black text-gray-900 dark:text-white tracking-tighter">Diet <span class="text-blue-600">Omni</span></h1>
                <p class="text-[11px] font-bold text-blue-500/60 uppercase tracking-[0.3em]">Advanced Macro Tracker</p>
            </div>
            <button onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-gray-800 shadow-xl border border-gray-100 dark:border-gray-700 active:scale-90 transition-transform">🌙</button>
        </header>

        <div id="dietTab" class="tab-content active">
            <div class="card p-8 mb-8 border-b-8 border-blue-500">
                <h2 class="text-xs font-black mb-6 opacity-40 tracking-widest uppercase text-gray-800 dark:text-gray-400">Personal Health Profile</h2>
                <div class="grid grid-cols-2 gap-5 text-sm">
                    <div><label class="block text-[10px] mb-2 font-black opacity-60">目前體重 (kg)</label><input id="weight" type="number" step="0.1" class="w-full p-4 rounded-2xl outline-none"></div>
                    <div><label class="block text-[10px] mb-2 font-black opacity-60">目標體重 (kg)</label><input id="targetWeight" type="number" step="0.1" class="w-full p-4 rounded-2xl outline-none"></div>
                    <div><label class="block text-[10px] mb-2 font-black opacity-60">身高 (cm)</label><input id="height" type="number" class="w-full p-4 rounded-2xl outline-none"></div>
                    <div><label class="block text-[10px] mb-2 font-black opacity-60">年齡</label><input id="age" type="number" class="w-full p-4 rounded-2xl outline-none"></div>
                    <div class="col-span-2">
                        <label class="block text-[10px] mb-2 font-black text-blue-500 italic">日常活動量級別 (詳細描述)</label>
                        <select id="activity" class="w-full p-4 rounded-2xl outline-none">
                            <option value="1.2">久坐型：幾乎不運動，辦公室工作者</option>
                            <option value="1.375">輕度活動：每週運動 1-3 天 (輕度慢跑、散步或瑜伽)</option>
                            <option value="1.55">中度活動：每週運動 3-5 天 (重訓、游泳或球類)</option>
                            <option value="1.725">高度活動：每週運動 6-7 天 (高強度運動、專業訓練員)</option>
                            <option value="1.9">極限活動：每日雙練、極重體力勞動、馬拉松競技</option>
                        </select>
                    </div>
                    <div><label class="block text-[10px] mb-2 font-black opacity-60">性別</label><select id="gender" class="w-full p-4 rounded-2xl outline-none"><option value="male">男性</option><option value="female">女性</option></select></div>
                    <div class="flex flex-col justify-end text-[13px] font-black italic">
                        <span class="text-blue-500">BMI: <span id="bmiVal">--</span></span>
                        <span class="text-purple-600">TDEE: <span id="tdeeVal">--</span> kcal</span>
                    </div>
                    <button onclick="saveUserDetail()" class="col-span-2 mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 active:scale-95 transition-all">更新生理數據</button>
                </div>
            </div>

            <div class="card p-8 mb-8">
                <div class="grid grid-cols-2 gap-4 mb-5">
                    <select id="mealTime" class="p-4 rounded-2xl text-sm outline-none font-black text-blue-600 border-2 border-blue-50 dark:border-gray-700 bg-white dark:bg-gray-800">
                        <option value="早餐">🌅 早餐</option><option value="午餐">☀️ 午餐</option><option value="晚餐">🌙 晚餐</option><option value="小食/其他">🍭 小食/其他</option>
                    </select>
                    <div class="relative">
                        <input id="foodName" type="text" placeholder="🔍 搜尋 1000+ 食物與海鮮" class="w-full p-4 rounded-2xl text-sm outline-none" oninput="handleFoodInput(this.value)">
                        <div id="suggestionBox" class="suggestion-box hidden"></div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="text-center"><p class="text-[10px] font-black mb-2 text-red-500">蛋白 (g)</p><input id="pInput" type="number" step="0.1" placeholder="0" class="w-full p-4 rounded-2xl text-center outline-none"></div>
                    <div class="text-center"><p class="text-[10px] font-black mb-2 text-green-600">碳水 (g)</p><input id="cInput" type="number" step="0.1" placeholder="0" class="w-full p-4 rounded-2xl text-center outline-none"></div>
                    <div class="text-center"><p class="text-[10px] font-black mb-2 text-yellow-600">脂肪 (g)</p><input id="fInput" type="number" step="0.1" placeholder="0" class="w-full p-4 rounded-2xl text-center outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="addWater(250)" class="p-4 rounded-2xl text-[11px] font-black bg-cyan-50 text-cyan-600 dark:bg-cyan-950/40">💧 飲水 +250ml (<span id="waterText">0</span>)</button>
                    <button onclick="addEntry()" class="bg-gray-900 dark:bg-blue-600 text-white p-4 rounded-2xl font-black text-sm active:scale-95 transition-transform">✅ 記錄進食</button>
                </div>
            </div>

            <div class="card p-8 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-lg">今日能量分析</h2>
                    <span id="remainingCal" class="text-[12px] font-black px-5 py-2 rounded-full">--</span>
                </div>
                
                <div class="flex justify-between items-center bg-gray-50 dark:bg-gray-800/60 p-4 rounded-2xl mb-8 ratio-display">
                    <div class="flex flex-col items-center">
                        <span class="text-red-500 text-[9px] uppercase">Protein %</span>
                        <span id="pRatio" class="text-gray-900 dark:text-white">0%</span>
                    </div>
                    <div class="h-8 w-[1px] bg-gray-200 dark:bg-gray-700"></div>
                    <div class="flex flex-col items-center">
                        <span class="text-green-600 text-[9px] uppercase">Carbs %</span>
                        <span id="cRatio" class="text-gray-900 dark:text-white">0%</span>
                    </div>
                    <div class="h-8 w-[1px] bg-gray-200 dark:bg-gray-700"></div>
                    <div class="flex flex-col items-center">
                        <span class="text-yellow-600 text-[9px] uppercase">Fats %</span>
                        <span id="fRatio" class="text-gray-900 dark:text-white">0%</span>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-8 items-center">
                    <div class="w-36 h-36 flex-shrink-0 relative"><canvas id="macroPieChart"></canvas></div>
                    <div class="flex-grow w-full">
                        <div class="mb-6">
                            <div class="flex justify-between mb-2 text-[10px] font-black"><span class="opacity-50 uppercase">Daily Goal Progress</span><span id="calPercentText">0%</span></div>
                            <div class="w-full bg-gray-100 dark:bg-gray-700 h-3 rounded-full overflow-hidden shadow-inner"><div id="calProgress" class="progress-bar bg-gradient-to-r from-blue-400 to-blue-600 h-full w-0"></div></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 text-center">
                            <div class="bg-gray-50 dark:bg-gray-800/60 p-4 rounded-2xl"><p class="text-[10px] font-bold opacity-40 mb-1">總量 (kcal)</p><p id="totalCal" class="text-base font-black">0</p></div>
                            <div class="bg-red-50 dark:bg-red-900/10 p-4 rounded-2xl"><p class="text-[10px] font-black text-red-500 mb-1">蛋白質 (g)</p><p id="totalP" class="text-base font-black">0g</p></div>
                            <div class="bg-green-50 dark:bg-green-900/10 p-4 rounded-2xl"><p class="text-[10px] font-black text-green-600 mb-1">碳水 (g)</p><p id="totalC" class="text-base font-black">0g</p></div>
                            <div class="bg-yellow-50 dark:bg-yellow-900/10 p-4 rounded-2xl"><p class="text-[10px] font-black text-yellow-600 mb-1">脂肪 (g)</p><p id="totalF" class="text-base font-black">0g</p></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-8 mb-8">
                <div id="logContainer" class="max-h-[500px] overflow-y-auto"></div>
                <button onclick="clearAll()" class="w-full text-center text-red-400 text-[11px] mt-10 font-bold tracking-[0.2em] hover:text-red-600 uppercase">Clear All Records</button>
            </div>
            
            <div class="card p-8 mb-16">
                <h3 class="text-[12px] font-black opacity-30 mb-8 tracking-[0.2em] uppercase">Trends Analytics</h3>
                <div class="h-[220px] w-full mb-12"><canvas id="trendChart"></canvas></div>
                <div class="h-[220px] w-full"><canvas id="weightChart"></canvas></div>
            </div>
        </div>

        <div id="gymTab" class="tab-content">
            <div class="card p-8 mb-8 border-b-8 border-purple-500">
                <h2 class="text-xs font-black mb-8 opacity-40 tracking-widest uppercase">Workout Logger</h2>
                <input id="workoutName" type="text" placeholder="動作名稱" class="w-full p-5 rounded-2xl text-sm outline-none mb-4">
                <div class="grid grid-cols-3 gap-4 mb-8">
                    <div><p class="text-[10px] font-black mb-2 text-center opacity-60">重量 (kg)</p><input id="workoutWeight" type="number" class="w-full p-5 rounded-2xl text-center outline-none"></div>
                    <div><p class="text-[10px] font-black mb-2 text-center opacity-60">組數</p><input id="workoutSets" type="number" class="w-full p-5 rounded-2xl text-center outline-none"></div>
                    <div><p class="text-[10px] font-black mb-2 text-center opacity-60">次數</p><input id="workoutReps" type="number" class="w-full p-5 rounded-2xl text-center outline-none"></div>
                </div>
                <button onclick="addWorkout()" class="w-full bg-purple-600 text-white py-5 rounded-2xl font-black text-sm active:scale-95 transition-all">完成紀錄</button>
            </div>
            <div class="card p-8 mb-8"><ul id="gymLogList" class="space-y-4"></ul></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-2xl border-t border-gray-100 dark:border-gray-800 flex justify-around py-5 px-10 z-50">
        <button onclick="switchTab('diet')" id="navDiet" class="flex flex-col items-center nav-active text-gray-400 transition-all">
            <span class="text-2xl">🥗</span><span class="text-[11px] font-black mt-1">DIET</span>
        </button>
        <button onclick="switchTab('gym')" id="navGym" class="flex flex-col items-center text-gray-400 transition-all">
            <span class="text-2xl">💪</span><span class="text-[11px] font-black mt-1">GYM</span>
        </button>
    </nav>

    <script>
        // 🚨 終極大型資料庫 - 絕不刪減，特別強化海鮮資料
        const database = {
            seafood: [
                { name: "鮪魚 (100g)", p: 24, c: 0, f: 0.5 }, { name: "鮭魚 (100g)", p: 20.2, c: 0, f: 13.5 }, { name: "鯛魚片 (100g)", p: 18.5, c: 0, f: 1.5 },
                { name: "草蝦 (10隻)", p: 24, c: 1, f: 1.2 }, { name: "蛤蜊 (100g)", p: 12, c: 3, f: 0.5 }, { name: "透抽/中卷 (100g)", p: 16, c: 1, f: 1 },
                { name: "旗魚 (100g)", p: 22, c: 0, f: 4 }, { name: "生蠔/牡蠣 (100g)", p: 9, c: 4, f: 2 }, { name: "龍蝦 (100g)", p: 19, c: 0.5, f: 0.6 },
                { name: "比目魚 (100g)", p: 15, c: 0, f: 2.5 }, { name: "鯖魚 (100g)", p: 20, c: 0, f: 15 }, { name: "虱目魚 (100g)", p: 20, c: 0, f: 12 },
                { name: "章魚 (100g)", p: 15, c: 2, f: 0.4 }, { name: "干貝 (一個)", p: 3.5, c: 0.5, f: 0.1 }, { name: "秋刀魚 (一條)", p: 20, c: 0, f: 18 },
                { name: "帝王蟹肉 (100g)", p: 18, c: 0, f: 1.2 }, { name: "白帶魚 (100g)", p: 17, c: 0, f: 4.5 }, { name: "吻仔魚 (100g)", p: 18, c: 1, f: 2 }
            ],
            fruits: [
                { name: "香蕉 (一根)", p: 1.1, c: 27, f: 0.3 }, { name: "蘋果 (180g)", p: 0.5, c: 25, f: 0.3 }, { name: "奇異果 (一個)", p: 1.1, c: 15, f: 0.5 },
                { name: "藍莓 (100g)", p: 0.7, c: 14, f: 0.3 }, { name: "芭樂 (200g)", p: 5, c: 28, f: 1.2 }, { name: "芒果 (100g)", p: 0.8, c: 15, f: 0.4 },
                { name: "火龍果 (100g)", p: 1.2, c: 13, f: 0.5 }, { name: "鳳梨 (100g)", p: 0.5, c: 13, f: 0.1 }, { name: "西瓜 (100g)", p: 0.6, c: 8, f: 0.2 },
                { name: "水蜜桃 (一個)", p: 1.4, c: 14, f: 0.4 }, { name: "釋迦 (一個)", p: 4, c: 50, f: 0.5 }, { name: "蓮霧 (一個)", p: 0.5, c: 8, f: 0.1 }
            ],
            meat: [
                { name: "雞胸肉 (100g)", p: 31, c: 0, f: 3.6 }, { name: "雞腿肉 (100g)", p: 24, c: 0, f: 8 }, { name: "豬里肌 (100g)", p: 22.2, c: 0, f: 10.2 },
                { name: "牛腱 (100g)", p: 26, c: 0, f: 4 }, { name: "羊肉片 (100g)", p: 18.5, c: 0, f: 15.2 }, { name: "羊排 (100g)", p: 16.2, c: 0, f: 23 }
            ],
            staples: [
                { name: "白飯 (一碗)", p: 4.1, c: 60, f: 0.6 }, { name: "糙米飯 (一碗)", p: 5.2, c: 55, f: 1.8 }, { name: "滷肉飯 (一碗)", p: 12, c: 68, f: 25 },
                { name: "地瓜 (150g)", p: 1.8, c: 36, f: 0.3 }, { name: "水餃 (10顆)", p: 20, c: 55, f: 35 }
            ],
            protein: [
                { name: "無糖豆漿 (400ml)", p: 14, c: 6, f: 8 }, { name: "雞蛋 (一顆)", p: 7, c: 0.6, f: 5 }, { name: "乳清蛋白 (一匙)", p: 25, c: 2, f: 1.5 }
            ]
        };

        const commonFoods = Object.values(database).flat();

        let historyData = JSON.parse(localStorage.getItem('diet_vRatio')) || {};
        let weightHistory = JSON.parse(localStorage.getItem('weight_vRatio')) || [];
        let gymData = JSON.parse(localStorage.getItem('gym_vRatio')) || {};
        let user = JSON.parse(localStorage.getItem('user_vRatio')) || { gender:'male', age:25, weight:70, targetWeight:70, height:170, activity:1.2, tdee: 2000 };
        let today = new Date().toLocaleDateString();
        let logs = historyData[today]?.logs || [];
        let water = historyData[today]?.water || 0;
        let gymLogs = gymData[today] || [];
        let trendChart, weightChart, macroPieChart;

        function handleFoodInput(val) {
            const box = document.getElementById('suggestionBox');
            if (!val) { box.classList.add('hidden'); return; }
            const matches = commonFoods.filter(f => f.name.includes(val)).slice(0, 30);
            if (matches.length > 0) {
                box.innerHTML = matches.map(f => {
                    return `
                    <div class="p-5 border-b dark:border-gray-800 cursor-pointer hover:bg-blue-50 dark:hover:bg-gray-700 transition-colors" onclick="selectFood('${f.name}', ${f.p}, ${f.c}, ${f.f})">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-black text-sm">${f.name}</span>
                            <span class="text-blue-500 font-black text-sm">${Math.round((f.p*4)+(f.c*4)+(f.f*9))} kcal</span>
                        </div>
                        <div class="flex gap-3 text-[10px] font-bold opacity-60">
                            <span class="text-red-500">P: ${f.p}g</span>
                            <span class="text-green-600">C: ${f.c}g</span>
                            <span class="text-yellow-600">F: ${f.f}g</span>
                        </div>
                    </div>`;
                }).join('');
                box.classList.remove('hidden');
            } else box.classList.add('hidden');
        }

        function selectFood(n, p, c, f) {
            document.getElementById('foodName').value = n; document.getElementById('pInput').value = p;
            document.getElementById('cInput').value = c; document.getElementById('fInput').value = f;
            document.getElementById('suggestionBox').classList.add('hidden');
        }

        function saveUserDetail() {
            ['weight','targetWeight','height','age','activity','gender'].forEach(id => {
                const el = document.getElementById(id); user[id] = isNaN(parseFloat(el.value)) ? el.value : parseFloat(el.value);
            });
            let bmr = (10 * user.weight) + (6.25 * user.height) - (5 * user.age);
            bmr = (user.gender === 'male') ? bmr + 5 : bmr - 161;
            user.tdee = Math.round(bmr * user.activity);
            let existingIdx = weightHistory.findIndex(h => h.date === today);
            if(existingIdx > -1) weightHistory[existingIdx].val = user.weight; else weightHistory.push({ date: today, val: user.weight });
            updateUI();
        }

        function updateUI() {
            let goalCal = user.weight === user.targetWeight ? user.tdee : (user.targetWeight > user.weight ? user.tdee + 400 : user.tdee - 500);
            document.getElementById('tdeeVal').innerText = user.tdee;
            document.getElementById('bmiVal').innerText = (user.weight / ((user.height/100)**2)).toFixed(1);
            let tCal = 0, tP = 0, tC = 0, tF = 0;
            const container = document.getElementById('logContainer'); container.innerHTML = '';
            ["早餐", "午餐", "晚餐", "小食/其他"].forEach(meal => {
                const mealLogs = logs.filter(l => (l.time || "小食/其他") === meal);
                if (mealLogs.length > 0) {
                    container.innerHTML += `<div class="meal-header">${meal}</div><ul id="list-${meal}" class="space-y-3"></ul>`;
                    const mealList = document.getElementById(`list-${meal}`);
                    mealLogs.forEach((item) => {
                        const cal = (item.p*4) + (item.c*4) + (item.f*9); tCal += cal; tP += item.p; tC += item.c; tF += item.f;
                        const idx = logs.indexOf(item);
                        mealList.innerHTML += `<li class="flex justify-between items-center bg-gray-50 dark:bg-gray-800/40 p-4 rounded-2xl text-[12px] font-black shadow-sm"><span>${item.name}</span><span>${Math.round(cal)} kcal <button onclick="deleteItem(${idx})" class="ml-3 text-red-400">✕</button></span></li>`;
                    });
                }
            });
            
            // 更新總量數值
            document.getElementById('totalCal').innerText = Math.round(tCal);
            document.getElementById('totalP').innerText = Math.round(tP) + 'g'; 
            document.getElementById('totalC').innerText = Math.round(tC) + 'g'; 
            document.getElementById('totalF').innerText = Math.round(tF) + 'g';
            
            // 計算百分比 (基於熱量佔比)
            if (tCal > 0) {
                const pRatio = Math.round((tP * 4 / tCal) * 100);
                const cRatio = Math.round((tC * 4 / tCal) * 100);
                const fRatio = 100 - pRatio - cRatio;
                document.getElementById('pRatio').innerText = pRatio + '%';
                document.getElementById('cRatio').innerText = cRatio + '%';
                document.getElementById('fRatio').innerText = fRatio + '%';
                macroPieChart.data.datasets[0].data = [tP*4, tC*4, tF*9]; macroPieChart.update();
            }

            const remain = goalCal - tCal;
            document.getElementById('remainingCal').innerText = remain >= 0 ? `剩餘 ${Math.round(remain)} kcal` : `超標 ${Math.abs(Math.round(remain))} kcal`;
            document.getElementById('remainingCal').className = `text-[12px] font-black px-5 py-2 rounded-full ${remain >= 0 ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            const perc = Math.min((tCal/goalCal)*100, 100);
            document.getElementById('calProgress').style.width = perc + '%';
            document.getElementById('calPercentText').innerText = Math.round(perc) + '%';
            document.getElementById('waterText').innerText = water;

            const gList = document.getElementById('gymLogList'); gList.innerHTML = '';
            gymLogs.forEach((g, i) => { gList.innerHTML += `<li class="bg-gray-50 dark:bg-gray-800/40 p-5 rounded-3xl flex justify-between items-center"><div><span class="font-black text-sm">${g.name}</span><div class="text-[11px] opacity-50 font-bold mt-1 text-purple-500">${g.weight}kg · ${g.sets}組 · ${g.reps}下</div></div><button onclick="deleteGymItem(${i})" class="w-10 h-10 rounded-full bg-red-50 dark:bg-red-900/20 text-red-400 flex items-center justify-center">✕</button></li>`; });
            
            historyData[today] = { logs, water, tCal }; gymData[today] = gymLogs;
            localStorage.setItem('diet_vRatio', JSON.stringify(historyData)); 
            localStorage.setItem('gym_vRatio', JSON.stringify(gymData));
            localStorage.setItem('user_vRatio', JSON.stringify(user)); 
            localStorage.setItem('weight_vRatio', JSON.stringify(weightHistory));
            updateCharts(goalCal);
        }

        function updateCharts(goal) {
            const lbls = []; const cals = []; const goals = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i); let dStr = d.toLocaleDateString();
                lbls.push(d.getDate() + '日'); cals.push(historyData[dStr]?.tCal || 0); goals.push(goal);
            }
            trendChart.data.labels = lbls; trendChart.data.datasets[0].data = cals; trendChart.data.datasets[1].data = goals; trendChart.update();
            weightChart.data.labels = weightHistory.map(h => h.date.split('/')[2] + '日'); weightChart.data.datasets[0].data = weightHistory.map(h => h.val); weightChart.update();
        }

        function initCharts() {
            const isDark = document.documentElement.classList.contains('dark');
            macroPieChart = new Chart(document.getElementById('macroPieChart'), { type: 'doughnut', data: { datasets: [{ data: [1,1,1], backgroundColor: ['#ef4444', '#22c55e', '#facc15'], borderWidth: 0 }] }, options: { cutout: '85%', plugins: { legend: { display: false } } } });
            trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels: [], datasets: [{ label: '攝取', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }, { label: '目標', data: [], borderColor: '#ef4444', borderDash: [5, 5], pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: isDark ? '#334155' : '#f1f5f9' } } } } });
            weightChart = new Chart(document.getElementById('weightChart'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#a855f7', backgroundColor: 'rgba(168, 85, 247, 0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: isDark ? '#334155' : '#f1f5f9' } } } } });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            if (tab === 'diet') { document.getElementById('dietTab').classList.add('active'); document.getElementById('navDiet').classList.add('nav-active'); }
            else { document.getElementById('gymTab').classList.add('active'); document.getElementById('navGym').classList.add('nav-active'); }
        }

        function addEntry() {
            const time = document.getElementById('mealTime').value; const n = document.getElementById('foodName').value || "紀錄進食";
            const p = parseFloat(document.getElementById('pInput').value) || 0; const c = parseFloat(document.getElementById('cInput').value) || 0; const f = parseFloat(document.getElementById('fInput').value) || 0;
            if(p+c+f > 0) { logs.push({time, name:n, p, c, f}); updateUI(); }
            ['foodName','pInput','cInput','fInput'].forEach(id => document.getElementById(id).value = '');
        }

        function addWorkout() {
            const n = document.getElementById('workoutName').value; const w = document.getElementById('workoutWeight').value; const s = document.getElementById('workoutSets').value; const r = document.getElementById('workoutReps').value;
            if (n) { gymLogs.push({ name:n, weight:w, sets:s, reps:r }); updateUI(); }
            ['workoutName','workoutWeight','workoutSets','workoutReps'].forEach(id => document.getElementById(id).value = '');
        }

        function toggleDarkMode() { localStorage.theme = document.documentElement.classList.toggle('dark') ? 'dark' : 'light'; location.reload(); }
        function addWater(a) { water += a; updateUI(); }
        function deleteItem(i) { logs.splice(i, 1); updateUI(); }
        function deleteGymItem(i) { gymLogs.splice(i, 1); updateUI(); }
        function clearAll() { if(confirm("確定清空今日所有紀錄？")) { logs = []; water = 0; updateUI(); } }

        window.onload = () => { ['weight','targetWeight','height','age','activity','gender'].forEach(id => { if(user[id]) document.getElementById(id).value = user[id]; }); initCharts(); updateUI(); };
    </script>
</body>
</html>
