<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>健康體態目標達成儀</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2738/2738658.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    
    <style>
        :root { 
            --sat: env(safe-area-inset-top); 
            --sab: env(safe-area-inset-bottom);
        }
        body { 
            background-color: #f1f5f9; 
            color: #1e293b; /* 明亮模式預設深色字 */
            padding-top: calc(1.5rem + var(--sat)); 
            padding-bottom: calc(1rem + var(--sab));
            transition: all 0.3s ease; 
            font-family: 'PingFang TC', sans-serif;
        }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .dark .card { background: #1e293b; border: 1px solid #334155; box-shadow: none; }
        
        input, select { 
            background-color: #f8fafc; 
            color: #1e293b; 
            border: 1px solid #e2e8f0;
        }
        .dark input, .dark select { 
            background-color: #334155; 
            color: #f1f5f9; 
            border-color: #475569;
        }
        .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="px-5">

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">體態目標 <span class="text-blue-600">Pro+</span></h1>
            <button onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-gray-800 shadow-lg active:scale-90 transition border border-gray-100 dark:border-gray-700">
                <span id="darkBtnIcon" class="text-2xl">🌙</span>
            </button>
        </header>

        <div class="card p-6 mb-8 border-t-4 border-blue-500">
            <div class="flex items-center gap-2 mb-6">
                <span class="text-xl">👤</span>
                <h2 class="text-sm font-black uppercase tracking-widest opacity-70">身體數據設定</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div><label class="block text-[11px] mb-1.5 font-bold opacity-50">目前體重 (kg)</label><input id="weight" type="number" step="0.1" class="w-full p-3 rounded-2xl font-bold text-blue-600 outline-none"></div>
                <div><label class="block text-[11px] mb-1.5 font-bold opacity-50">目標體重 (kg)</label><input id="targetWeight" type="number" step="0.1" class="w-full p-3 rounded-2xl font-bold text-orange-600 outline-none"></div>
                <div><label class="block text-[11px] mb-1.5 font-bold opacity-50">目前體脂 %</label><input id="fatPercent" type="number" step="0.1" class="w-full p-3 rounded-2xl font-bold text-purple-600 outline-none"></div>
                <div><label class="block text-[11px] mb-1.5 font-bold opacity-50">目標體脂 %</label><input id="targetFat" type="number" step="0.1" class="w-full p-3 rounded-2xl font-bold text-pink-600 outline-none"></div>
                <div><label class="block text-[11px] mb-1.5 font-bold opacity-50">身高 (cm)</label><input id="height" type="number" class="w-full p-3 rounded-2xl outline-none font-medium"></div>
                <div><label class="block text-[11px] mb-1.5 font-bold opacity-50">年齡</label><input id="age" type="number" class="w-full p-3 rounded-2xl outline-none font-medium"></div>
                <div class="col-span-2"><label class="block text-[11px] mb-1.5 font-bold opacity-50">日常活動量</label>
                    <select id="activity" class="w-full p-3 rounded-2xl outline-none font-medium appearance-none">
                        <option value="1.2">久坐 (辦公室/不運動)</option>
                        <option value="1.375">輕度 (每週運動 1-3 天)</option>
                        <option value="1.55">中度 (每週運動 3-5 天)</option>
                        <option value="1.725">重度 (每週運動 6-7 天)</option>
                    </select>
                </div>
                <div class="col-span-2"><label class="block text-[11px] mb-1.5 font-bold opacity-50">性別</label>
                    <select id="gender" class="w-full p-3 rounded-2xl outline-none font-medium appearance-none">
                        <option value="male">男性</option>
                        <option value="female">女性</option>
                    </select>
                </div>
            </div>
            <button onclick="saveUserDetail()" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black text-lg active:scale-[0.98] transition shadow-xl shadow-blue-200 dark:shadow-none">紀錄並更新數據</button>
        </div>

        <div class="card p-6 mb-8">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="weightDiffText" class="text-lg font-black text-gray-800 dark:text-white">請輸入數據</h3>
                    <div id="modeBadge" class="inline-block mt-2 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter"></div>
                </div>
                <div class="text-right">
                    <div class="text-[11px] font-bold text-blue-500">體重: <span id="curW" class="text-sm">--</span></div>
                    <div class="text-[11px] font-bold text-purple-500">體脂: <span id="curF" class="text-sm">--</span></div>
                </div>
            </div>
            <div class="w-full bg-gray-100 dark:bg-gray-700 h-3 rounded-full overflow-hidden">
                <div id="weightProgressBar" class="progress-bar bg-gradient-to-r from-blue-500 to-indigo-600 h-full w-0"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6 mb-8">
            <div class="card p-5"><h3 class="text-[10px] font-black opacity-40 mb-4 uppercase">熱量攝取趨勢 (7D)</h3><div class="h-[200px]"><canvas id="trendChart"></canvas></div></div>
            <div class="card p-5"><h3 class="text-[10px] font-black opacity-40 mb-4 uppercase">體重變化紀錄</h3><div class="h-[200px]"><canvas id="weightChart"></canvas></div></div>
        </div>

        <div class="card p-6 mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-gray-800 dark:text-white">今日熱量</h2>
                <span id="remainingCal" class="text-[10px] font-black px-4 py-1.5 rounded-full shadow-sm">--</span>
            </div>
            <div class="w-full bg-gray-100 dark:bg-gray-700 h-4 rounded-full overflow-hidden mb-8">
                <div id="calProgress" class="progress-bar bg-green-500 h-full w-0"></div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-2xl text-center"><p class="text-[10px] font-bold text-blue-500 mb-1">攝取</p><p id="totalCal" class="text-xl font-black">0</p></div>
                <div class="bg-red-50 dark:bg-red-900/20 p-3 rounded-2xl text-center"><p class="text-[10px] font-bold text-red-500 mb-1">蛋白</p><p id="totalP" class="text-xl font-black">0</p></div>
                <div class="bg-green-50 dark:bg-green-900/20 p-3 rounded-2xl text-center"><p class="text-[10px] font-bold text-green-600 mb-1">碳水</p><p id="totalC" class="text-xl font-black">0</p></div>
                <div class="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded-2xl text-center"><p class="text-[10px] font-bold text-yellow-600 mb-1">脂肪</p><p id="totalF" class="text-xl font-black">0</p></div>
            </div>
        </div>

        <div class="h-20"></div>
    </div>

    <script>
        // 核心邏輯保持不變，優化 Chart 顏色與 UI 連動
        let historyData = JSON.parse(localStorage.getItem('dietV18')) || {};
        let weightHistory = JSON.parse(localStorage.getItem('weightV18')) || [];
        let userDetail = JSON.parse(localStorage.getItem('userV18')) || { 
            gender:'male', age:25, weight:70, targetWeight:65, fatPercent:20, targetFat:15, height:170, activity:1.2, tdee: 2000 
        };
        
        let today = new Date().toLocaleDateString();
        let logs = historyData[today]?.logs || [];
        let water = historyData[today]?.water || 0;
        let trendChart, weightChart;

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('darkBtnIcon').innerText = isDark ? '☀️' : '🌙';
            updateChartColors();
        }

        function initCharts() {
            const chartConfig = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
            
            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: { labels: ['','','','','','',''], datasets: [
                    { label: '攝取', data: new Array(7).fill(0), borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                    { label: '目標', data: new Array(7).fill(2000), borderColor: '#f43f5e', borderDash: [5, 5], pointRadius: 0 }
                ]},
                options: chartConfig
            });

            weightChart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'kg', data: [], borderColor: '#8b5cf6', tension: 0.3, fill: false, pointRadius: 4 }] },
                options: chartConfig
            });
            updateChartColors();
        }

        function updateChartColors() {
            const isDark = document.documentElement.classList.contains('dark');
            const color = isDark ? '#94a3b8' : '#64748b';
            [trendChart, weightChart].forEach(chart => {
                if(!chart) return;
                chart.options.scales = {
                    x: { grid: { display: false }, ticks: { color: color, font: { size: 10 } } },
                    y: { grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' }, ticks: { color: color, font: { size: 10 } } }
                };
                chart.update();
            });
        }

        function saveUserDetail() {
            ['weight','targetWeight','fatPercent','targetFat','height','age','activity','gender'].forEach(id => {
                const val = document.getElementById(id).value;
                userDetail[id] = isNaN(parseFloat(val)) ? val : parseFloat(val);
            });

            let bmr;
            if (userDetail.fatPercent > 0) {
                const lbm = userDetail.weight * (1 - (userDetail.fatPercent / 100));
                bmr = 370 + (21.6 * lbm);
            } else {
                bmr = (10 * userDetail.weight) + (6.25 * userDetail.height) - (5 * userDetail.age);
                bmr = (userDetail.gender === 'male') ? bmr + 5 : bmr - 161;
            }
            userDetail.tdee = Math.round(bmr * userDetail.activity);

            if(!weightHistory.length || weightHistory[weightHistory.length-1].date !== today) {
                weightHistory.push({ date: today, val: userDetail.weight });
            } else {
                weightHistory[weightHistory.length-1].val = userDetail.weight;
            }
            updateUI();
        }

        function updateUI() {
            const isGain = userDetail.targetWeight > userDetail.weight;
            const goalCal = isGain ? userDetail.tdee + 300 : userDetail.tdee - 500;
            const diff = Math.abs(userDetail.weight - userDetail.targetWeight).toFixed(1);

            const badge = document.getElementById('modeBadge');
            badge.innerText = isGain ? "增肌模式 🥩" : "減脂模式 🔥";
            badge.className = `inline-block mt-2 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter ${isGain ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`;
            
            document.getElementById('weightDiffText').innerText = diff == 0 ? "目標已達成 🏆" : `距離目標還有 ${diff} kg`;
            document.getElementById('curW').innerText = userDetail.weight;
            document.getElementById('curF').innerText = userDetail.fatPercent ? userDetail.fatPercent + '%' : '--';

            // 進度條邏輯
            const startW = weightHistory[0]?.val || userDetail.weight;
            const totalProgress = Math.abs(startW - userDetail.targetWeight);
            const currentProgress = Math.abs(startW - userDetail.weight);
            document.getElementById('weightProgressBar').style.width = totalProgress === 0 ? '100%' : Math.min((currentProgress/totalProgress)*100, 100) + '%';

            // 熱量計算
            let tCal = 0, tP = 0, tC = 0, tF = 0;
            logs.forEach(item => {
                tCal += (item.p*4 + item.c*4 + item.f*9);
                tP += item.p; tC += item.c; tF += item.f;
            });

            document.getElementById('totalCal').innerText = Math.round(tCal);
            document.getElementById('totalP').innerText = Math.round(tP);
            document.getElementById('totalC').innerText = Math.round(tC);
            document.getElementById('totalF').innerText = Math.round(tF);

            const remain = goalCal - tCal;
            const remBtn = document.getElementById('remainingCal');
            remBtn.innerText = remain >= 0 ? `剩餘 ${Math.round(remain)} kcal` : `超標 ${Math.abs(Math.round(remain))} kcal`;
            remBtn.className = `text-[10px] font-black px-4 py-1.5 rounded-full shadow-sm ${remain >= 0 ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            document.getElementById('calProgress').style.width = Math.min((tCal/goalCal)*100, 100) + '%';

            // 圖表數據更新
            const calData = [];
            const dayLabels = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dateKey = d.toLocaleDateString();
                calData.push(historyData[dateKey]?.tCal || 0);
                dayLabels.push(d.getDate() + '日');
            }
            trendChart.data.labels = dayLabels;
            trendChart.data.datasets[0].data = calData;
            trendChart.data.datasets[1].data = new Array(7).fill(goalCal);
            trendChart.update();

            weightChart.data.labels = weightHistory.slice(-7).map(h => h.date.split('/')[2] + '日');
            weightChart.data.datasets[0].data = weightHistory.slice(-7).map(h => h.val);
            weightChart.update();

            localStorage.setItem('userV18', JSON.stringify(userDetail));
            localStorage.setItem('weightV18', JSON.stringify(weightHistory));
        }

        window.onload = () => {
            ['weight','targetWeight','fatPercent','targetFat','height','age','activity','gender'].forEach(id => {
                if(document.getElementById(id)) document.getElementById(id).value = userDetail[id] || '';
            });
            initCharts();
            updateUI();
        };
    </script>
</body>
</html>
