<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>健康體態 Pro+ 終極佈局版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { 
            background-color: #f1f5f9; color: #1e293b; 
            padding-top: calc(1rem + var(--sat)); padding-bottom: calc(5rem + var(--sab));
            transition: all 0.3s ease; font-family: 'PingFang TC', sans-serif;
        }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        input, select { background-color: #f8fafc; color: #1e293b; border: 1px solid #e2e8f0; font-weight: 600; }
        .dark input, .dark select { background-color: #334155; color: #f1f5f9; border-color: #475569; }
        .nav-active { color: #3b82f6 !important; font-weight: 900; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .suggestion-box {
            position: absolute; width: 100%; max-height: 250px; overflow-y: auto;
            background: white; border-radius: 12px; z-index: 100; margin-top: 4px; border: 1px solid #e2e8f0;
        }
        .dark .suggestion-box { background: #1e293b; border-color: #475569; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="px-5">
    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 id="pageTitle" class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">飲食 <span class="text-blue-600">Pro+</span></h1>
            <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white dark:bg-gray-800 shadow-lg">
                <span id="darkBtnIcon">🌙</span>
            </button>
        </header>

        <div id="dietTab" class="tab-content active">
            <div class="card p-6 mb-6 border-t-4 border-blue-500">
                <h2 class="text-xs font-black mb-4 opacity-50 tracking-widest text-gray-800 dark:text-gray-400">👤 數據設定</h2>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div><label class="block text-[10px] mb-1 font-bold opacity-60">目前體重 (kg)</label><input id="weight" type="number" step="0.1" class="w-full p-2.5 rounded-xl outline-none"></div>
                    <div><label class="block text-[10px] mb-1 font-bold opacity-60">目標體重 (kg)</label><input id="targetWeight" type="number" step="0.1" class="w-full p-2.5 rounded-xl outline-none"></div>
                    <div><label class="block text-[10px] mb-1 font-bold opacity-60">身高 (cm)</label><input id="height" type="number" class="w-full p-2.5 rounded-xl outline-none"></div>
                    <div><label class="block text-[10px] mb-1 font-bold opacity-60">年齡</label><input id="age" type="number" class="w-full p-2.5 rounded-xl outline-none"></div>
                    <div class="col-span-2">
                        <label class="block text-[10px] mb-1 font-bold opacity-60">日常活動量</label>
                        <select id="activity" class="w-full p-2.5 rounded-xl outline-none">
                            <option value="1.2">久坐 (幾乎不運動)</option>
                            <option value="1.375">輕度 (每週 1 - 3 天)</option>
                            <option value="1.55">中度 (每週 3 - 5 天)</option>
                            <option value="1.725">重度 (每週 6 - 7 天)</option>
                            <option value="1.9">極限 (高強度體力活)</option>
                        </select>
                    </div>
                    <div><label class="block text-[10px] mb-1 font-bold opacity-60">性別</label>
                        <select id="gender" class="w-full p-2.5 rounded-xl outline-none"><option value="male">男性</option><option value="female">女性</option></select>
                    </div>
                    <div class="flex flex-col justify-end text-[11px] font-black italic">
                        <span class="text-blue-500">BMI: <span id="bmiVal">--</span></span>
                        <span class="text-purple-500">TDEE: <span id="tdeeVal">--</span></span>
                    </div>
                    <button onclick="saveUserDetail()" class="col-span-2 mt-2 bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg">紀錄並更新圖表</button>
                </div>
            </div>

            <div class="card p-6 mb-6">
                <div class="flex justify-between items-center mb-4"><h2 class="font-black text-sm">今日進度與佔比</h2><span id="remainingCal" class="text-[10px] font-black px-3 py-1 rounded-full">--</span></div>
                <div class="flex flex-row gap-4 items-center">
                    <div class="w-24 h-24 flex-shrink-0"><canvas id="macroPieChart"></canvas></div>
                    <div class="flex-grow">
                        <div class="w-full bg-gray-100 dark:bg-gray-700 h-2 rounded-full overflow-hidden mb-4"><div id="calProgress" class="progress-bar bg-green-500 h-full w-0"></div></div>
                        <div class="grid grid-cols-4 gap-1 text-center">
                            <div class="bg-gray-50 dark:bg-gray-900/40 py-2 rounded-lg"><p class="text-[8px] font-bold">熱量</p><p id="totalCal" class="text-xs font-black">0</p></div>
                            <div class="bg-red-50 dark:bg-red-900/20 py-2 rounded-lg"><p class="text-[8px] font-bold text-red-500">蛋白</p><p id="totalP" class="text-xs font-black">0</p><p id="pctP" class="text-[8px] font-black text-red-400">0%</p></div>
                            <div class="bg-green-50 dark:bg-green-900/20 py-2 rounded-lg"><p class="text-[8px] font-bold text-green-600">碳水</p><p id="totalC" class="text-xs font-black">0</p><p id="pctC" class="text-[8px] font-black text-green-500">0%</p></div>
                            <div class="bg-yellow-50 dark:bg-yellow-900/20 py-2 rounded-lg"><p class="text-[8px] font-bold text-yellow-600">脂肪</p><p id="totalF" class="text-xs font-black">0</p><p id="pctF" class="text-[8px] font-black text-yellow-500">0%</p></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-6 mb-6">
                <div class="relative mb-3">
                    <input id="foodName" type="text" placeholder="搜尋食物..." class="w-full p-3 rounded-xl text-sm outline-none" oninput="handleFoodInput(this.value)">
                    <div id="suggestionBox" class="suggestion-box hidden shadow-xl"></div>
                </div>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <input id="pInput" type="number" placeholder="蛋白" class="p-3 rounded-xl text-sm outline-none">
                    <input id="cInput" type="number" placeholder="碳水" class="p-3 rounded-xl text-sm outline-none">
                    <input id="fInput" type="number" placeholder="脂肪" class="p-3 rounded-xl text-sm outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="addWater(250)" class="p-3 rounded-xl text-xs font-black bg-cyan-500 text-white">水 +250ml (<span id="waterText">0</span>)</button>
                    <button onclick="addEntry()" class="bg-blue-600 text-white p-3 rounded-xl font-black text-sm">加入紀錄</button>
                </div>
            </div>

            <div class="card p-5 mb-6">
                <ul id="logList" class="space-y-3 max-h-[150px] overflow-y-auto"></ul>
                <button onclick="clearAll()" class="w-full text-center text-red-500 text-[10px] mt-4 font-bold opacity-50">清空今日飲食</button>
            </div>
            
            <div class="card p-5 mb-6">
                <h3 class="text-[10px] font-black opacity-40 mb-2">🔥 7日熱量攝取趨勢</h3>
                <div class="h-[160px] w-full"><canvas id="trendChart"></canvas></div>
            </div>

            <div class="card p-5 mb-10">
                <h3 class="text-[10px] font-black opacity-40 mb-2">📉 體重變化趨勢</h3>
                <div class="h-[160px] w-full"><canvas id="weightChart"></canvas></div>
            </div>
        </div>

        <div id="gymTab" class="tab-content">
            <div class="card p-6 mb-6 border-t-4 border-purple-500">
                <h2 class="text-xs font-black mb-4 opacity-50 tracking-widest text-purple-600">💪 健身 Log</h2>
                <div class="grid grid-cols-1 gap-3 mb-4"><input id="workoutName" type="text" placeholder="動作名稱 (如：深蹲)" class="w-full p-3 rounded-xl text-sm outline-none"></div>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div><label class="block text-[10px] mb-1 font-bold opacity-50">重量 (kg)</label><input id="workoutWeight" type="number" class="w-full p-3 rounded-xl text-sm outline-none"></div>
                    <div><label class="block text-[10px] mb-1 font-bold opacity-50">組數</label><input id="workoutSets" type="number" class="w-full p-3 rounded-xl text-sm outline-none"></div>
                    <div><label class="block text-[10px] mb-1 font-bold opacity-50">次數</label><input id="workoutReps" type="number" class="w-full p-3 rounded-xl text-sm outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div><label class="block text-[10px] mb-1 font-bold opacity-50">RPE (1-10)</label><input id="workoutRPE" type="number" min="1" max="10" placeholder="8" class="w-full p-3 rounded-xl text-sm outline-none"></div>
                    <div class="flex items-end"><button onclick="addWorkout()" class="w-full bg-purple-600 text-white p-3 rounded-xl font-black text-sm">紀錄動作</button></div>
                </div>
            </div>
            <div class="card p-6 mb-6">
                <h2 class="text-xs font-black mb-4 opacity-50 tracking-widest text-purple-600">📝 今日訓練清單</h2>
                <ul id="gymLogList" class="space-y-3"></ul>
                <button onclick="clearGym()" class="w-full text-center text-red-500 text-[10px] mt-6 font-bold opacity-50">清空今日健身紀錄</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800 flex justify-around py-3 px-6 z-50">
        <button onclick="switchTab('diet')" id="navDiet" class="flex flex-col items-center nav-active text-gray-400"><span class="text-xl">🥗</span><span class="text-[10px] mt-1">飲食</span></button>
        <button onclick="switchTab('gym')" id="navGym" class="flex flex-col items-center text-gray-400"><span class="text-xl">🏋️</span><span class="text-[10px] mt-1">健身</span></button>
    </nav>

    <script>
        const commonFoods = [
            { name: "雞胸肉 (100g)", p: 31, c: 0, f: 3.6 }, { name: "雞腿肉 (100g/去皮)", p: 24, c: 0, f: 8 }, { name: "雞蛋 (一顆)", p: 7, c: 0.6, f: 5 },
            { name: "荷包蛋 (一顆)", p: 7, c: 0.6, f: 8 }, { name: "牛腱 (100g)", p: 26, c: 0, f: 4 }, { name: "鯛魚片 (100g)", p: 20, c: 0, f: 1.5 },
            { name: "無糖豆漿 (400ml)", p: 13, c: 7, f: 8 }, { name: "乳清蛋白 (一匙)", p: 25, c: 2, f: 1.5 }, { name: "白飯 (一碗/160g)", p: 4, c: 60, f: 0.6 },
            { name: "糙米飯 (一碗/160g)", p: 5, c: 55, f: 1.5 }, { name: "地瓜 (中/150g)", p: 2, c: 30, f: 0.2 }, { name: "全麥吐司 (一片)", p: 5, c: 22, f: 1.5 },
            { name: "香蕉 (一根)", p: 1.3, c: 27, f: 0.4 }, { name: "燙青菜 (一盤)", p: 1.5, c: 4, f: 5 }, { name: "滷肉飯 (一碗)", p: 12, c: 65, f: 25 },
            { name: "牛肉麵 (一碗)", p: 35, c: 75, f: 20 }, { name: "水餃 (一顆)", p: 2, c: 5, f: 3.5 }
        ];

        let historyData = JSON.parse(localStorage.getItem('diet_vFinal_Layout')) || {};
        let weightHistory = JSON.parse(localStorage.getItem('weight_vFinal_Layout')) || [];
        let gymData = JSON.parse(localStorage.getItem('gym_vFinal_Layout')) || {};
        let user = JSON.parse(localStorage.getItem('user_vFinal_Layout')) || { gender:'male', age:25, weight:70, targetWeight:70, height:170, activity:1.2, tdee: 2000 };
        let today = new Date().toLocaleDateString();
        let logs = historyData[today]?.logs || [];
        let water = historyData[today]?.water || 0;
        let gymLogs = gymData[today] || [];
        let trendChart, weightChart, macroPieChart;

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-gray-400'));
            if (tab === 'diet') {
                document.getElementById('dietTab').classList.add('active');
                document.getElementById('navDiet').classList.add('nav-active');
                document.getElementById('pageTitle').innerHTML = '飲食 <span class="text-blue-600">Pro+</span>';
            } else {
                document.getElementById('gymTab').classList.add('active');
                document.getElementById('navGym').classList.add('nav-active');
                document.getElementById('pageTitle').innerHTML = '健身 <span class="text-purple-600">Log</span>';
            }
        }

        function handleFoodInput(val) {
            const box = document.getElementById('suggestionBox');
            if (!val) { box.classList.add('hidden'); return; }
            const matches = commonFoods.filter(f => f.name.includes(val)).slice(0, 10);
            if (matches.length > 0) {
                box.innerHTML = matches.map(f => `<div class="p-3 border-b dark:border-gray-800 text-xs flex justify-between cursor-pointer" onclick="selectFood('${f.name}', ${f.p}, ${f.c}, ${f.f})"><span>${f.name}</span><span class="text-blue-500 font-bold">${Math.round(f.p*4+f.c*4+f.f*9)} kcal</span></div>`).join('');
                box.classList.remove('hidden');
            } else box.classList.add('hidden');
        }

        function selectFood(n, p, c, f) {
            document.getElementById('foodName').value = n; document.getElementById('pInput').value = p;
            document.getElementById('cInput').value = c; document.getElementById('fInput').value = f;
            document.getElementById('suggestionBox').classList.add('hidden');
        }

        function saveUserDetail() {
            ['weight','targetWeight','height','age','activity','gender'].forEach(id => {
                const el = document.getElementById(id); user[id] = isNaN(parseFloat(el.value)) ? el.value : parseFloat(el.value);
            });
            let bmr = (10 * user.weight) + (6.25 * user.height) - (5 * user.age);
            bmr = (user.gender === 'male') ? bmr + 5 : bmr - 161;
            user.tdee = Math.round(bmr * user.activity);
            
            let existingIdx = weightHistory.findIndex(h => h.date === today);
            if(existingIdx > -1) weightHistory[existingIdx].val = user.weight;
            else weightHistory.push({ date: today, val: user.weight });
            if(weightHistory.length > 14) weightHistory.shift(); 

            updateUI();
        }

        function updateUI() {
            let goalCal = user.weight === user.targetWeight ? user.tdee : (user.targetWeight > user.weight ? user.tdee + 300 : user.tdee - 500);
            document.getElementById('tdeeVal').innerText = user.tdee;
            document.getElementById('bmiVal').innerText = (user.weight / ((user.height/100)**2)).toFixed(1);
            
            let tCal = 0, tP = 0, tC = 0, tF = 0;
            const list = document.getElementById('logList'); list.innerHTML = '';
            logs.forEach((item, index) => {
                const cal = (item.p*4) + (item.c*4) + (item.f*9); tCal += cal; tP += item.p; tC += item.c; tF += item.f;
                list.innerHTML += `<li class="flex justify-between items-center bg-gray-50 dark:bg-gray-800/40 p-3 rounded-xl text-xs font-bold"><span>${item.name}</span><span>${Math.round(cal)} kcal <button onclick="deleteItem(${index})" class="ml-2 text-red-500">✕</button></span></li>`;
            });
            
            document.getElementById('totalCal').innerText = Math.round(tCal);
            document.getElementById('totalP').innerText = Math.round(tP); document.getElementById('totalC').innerText = Math.round(tC); document.getElementById('totalF').innerText = Math.round(tF);
            
            if (tCal > 0) {
                document.getElementById('pctP').innerText = Math.round((tP*4/tCal)*100) + '%';
                document.getElementById('pctC').innerText = Math.round((tC*4/tCal)*100) + '%';
                document.getElementById('pctF').innerText = Math.round((tF*9/tCal)*100) + '%';
                macroPieChart.data.datasets[0].data = [tP*4, tC*4, tF*9]; macroPieChart.update();
            }

            const remain = goalCal - tCal;
            document.getElementById('remainingCal').innerText = remain >= 0 ? `剩餘 ${Math.round(remain)}` : `超標 ${Math.abs(Math.round(remain))}`;
            document.getElementById('remainingCal').className = `text-[10px] font-black px-3 py-1 rounded-full ${remain >= 0 ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            document.getElementById('calProgress').style.width = Math.min((tCal/goalCal)*100, 100) + '%';
            document.getElementById('waterText').innerText = water;

            const gList = document.getElementById('gymLogList'); gList.innerHTML = '';
            gymLogs.forEach((g, i) => {
                gList.innerHTML += `<li class="bg-gray-50 dark:bg-gray-800/40 p-4 rounded-2xl"><div class="flex justify-between items-center mb-1"><span class="font-black text-sm">${g.name}</span><button onclick="deleteGymItem(${i})" class="text-red-400 text-xs">移除</button></div><div class="flex gap-3 text-[10px] font-bold opacity-70 italic"><span>${g.weight}kg</span><span>${g.sets}組</span><span>${g.reps}下</span><span>RPE:${g.rpe}</span></div></li>`;
            });

            // 圖表更新
            const lbls = []; const cals = []; const goals = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i); 
                let dStr = d.toLocaleDateString();
                lbls.push(d.getDate() + '日');
                cals.push(historyData[dStr]?.tCal || 0);
                goals.push(goalCal);
            }
            trendChart.data.labels = lbls; 
            trendChart.data.datasets[0].data = cals; 
            trendChart.data.datasets[1].data = goals;
            trendChart.update();

            weightChart.data.labels = weightHistory.map(h => h.date.split('/')[2] + '日');
            weightChart.data.datasets[0].data = weightHistory.map(h => h.val);
            weightChart.update();

            historyData[today] = { logs, water, tCal }; gymData[today] = gymLogs;
            localStorage.setItem('diet_vFinal_Layout', JSON.stringify(historyData)); 
            localStorage.setItem('gym_vFinal_Layout', JSON.stringify(gymData));
            localStorage.setItem('user_vFinal_Layout', JSON.stringify(user)); 
            localStorage.setItem('weight_vFinal_Layout', JSON.stringify(weightHistory));
        }

        function initCharts() {
            const isDark = document.documentElement.classList.contains('dark');
            const gridCol = isDark ? '#334155' : '#f1f5f9';
            const textCol = isDark ? '#94a3b8' : '#64748b';

            macroPieChart = new Chart(document.getElementById('macroPieChart'), { type: 'doughnut', data: { datasets: [{ data: [1,1,1], backgroundColor: ['#ef4444', '#22c55e', '#facc15'], borderWidth: 0 }] }, options: { cutout: '75%', plugins: { legend: { display: false } } } });

            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: { labels: [], datasets: [
                    { label: '攝取', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4 },
                    { label: '目標', data: [], borderColor: '#ef4444', borderDash: [5, 5], pointRadius: 0, tension: 0 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textCol, font: { size: 9 } } }, y: { grid: { color: gridCol }, ticks: { color: textCol, font: { size: 9 } } } } }
            });

            weightChart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textCol, font: { size: 9 } } }, y: { grid: { color: gridCol }, ticks: { color: textCol, font: { size: 9 } } } } }
            });
        }

        function addEntry() {
            const n = document.getElementById('foodName').value || "食物";
            const p = parseFloat(document.getElementById('pInput').value) || 0;
            const c = parseFloat(document.getElementById('cInput').value) || 0;
            const f = parseFloat(document.getElementById('fInput').value) || 0;
            if(p+c+f > 0) { logs.push({name:n, p, c, f}); updateUI(); }
            ['foodName','pInput','cInput','fInput'].forEach(id => document.getElementById(id).value = '');
        }

        function addWorkout() {
            const n = document.getElementById('workoutName').value;
            const w = document.getElementById('workoutWeight').value;
            const s = document.getElementById('workoutSets').value;
            const r = document.getElementById('workoutReps').value;
            const rpe = document.getElementById('workoutRPE').value;
            if (n && s) { gymLogs.push({ name:n, weight:w, sets:s, reps:r, rpe:rpe }); updateUI(); }
            ['workoutName','workoutWeight','workoutSets','workoutReps','workoutRPE'].forEach(id => document.getElementById(id).value = '');
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            location.reload();
        }
        function addWater(a) { water += a; updateUI(); }
        function deleteItem(i) { logs.splice(i, 1); updateUI(); }
        function deleteGymItem(i) { gymLogs.splice(i, 1); updateUI(); }
        function clearAll() { if(confirm("清空今日飲食紀錄？")) { logs = []; water = 0; updateUI(); } }
        function clearGym() { if(confirm("清空今日健身紀錄？")) { gymLogs = []; updateUI(); } }

        window.onload = () => {
            ['weight','targetWeight','height','age','activity','gender'].forEach(id => document.getElementById(id).value = user[id]);
            initCharts(); updateUI();
            document.addEventListener('click', (e) => { if(e.target.id !== 'foodName') document.getElementById('suggestionBox').classList.add('hidden'); });
        };
    </script>
</body>
</html>
