<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>健康體態目標達成儀 Pro+</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2738/2738658.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        body { 
            background-color: #f1f5f9; color: #1e293b; 
            padding-top: calc(1.5rem + var(--sat)); padding-bottom: calc(2rem + var(--sab));
            transition: all 0.3s ease; font-family: 'PingFang TC', sans-serif;
        }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .dark .card { background: #1e293b; border: 1px solid #334155; }
        
        input, select { background-color: #f8fafc; color: #1e293b; border: 1px solid #e2e8f0; font-weight: 600; }
        .dark input, .dark select { background-color: #334155; color: #f1f5f9; border-color: #475569; }
        
        .food-chip { cursor: pointer; border: 1px solid #e2e8f0; background: white; white-space: nowrap; font-size: 11px; padding: 6px 12px; border-radius: 99px; font-weight: bold; }
        .dark .food-chip { background: #334155; border-color: #475569; color: #cbd5e1; }
        
        .ai-tip { border-left: 4px solid #3b82f6; background-color: #eff6ff; padding: 10px; border-radius: 8px; font-size: 0.8rem; color: #1e40af; margin-bottom: 8px; }
        .dark .ai-tip { background-color: #1e3a8a; color: #bfdbfe; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="px-5">

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight">體態目標 <span class="text-blue-600">Pro+</span></h1>
            <button onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-gray-800 shadow-lg border border-gray-100 dark:border-gray-700 active:scale-90 transition">
                <span id="darkBtnIcon" class="text-2xl">🌙</span>
            </button>
        </header>

        <div class="card p-6 mb-6 border-t-4 border-blue-500">
            <h2 class="text-xs font-black mb-4 opacity-50 uppercase tracking-widest text-gray-800 dark:text-gray-400">👤 完整身體數據</h2>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <div><label class="block text-[10px] mb-1 font-bold opacity-60">目前體重 (kg)</label><input id="weight" type="number" step="0.1" class="w-full p-2.5 rounded-xl text-blue-600 outline-none"></div>
                <div><label class="block text-[10px] mb-1 font-bold opacity-60">目標體重 (kg)</label><input id="targetWeight" type="number" step="0.1" class="w-full p-2.5 rounded-xl text-orange-600 outline-none"></div>
                <div><label class="block text-[10px] mb-1 font-bold opacity-60">身高 (cm)</label><input id="height" type="number" class="w-full p-2.5 rounded-xl outline-none"></div>
                <div><label class="block text-[10px] mb-1 font-bold opacity-60">年齡</label><input id="age" type="number" class="w-full p-2.5 rounded-xl outline-none"></div>
                <div class="col-span-2">
                    <label class="block text-[10px] mb-1 font-bold opacity-60">日常活動量</label>
                    <select id="activity" class="w-full p-2.5 rounded-xl outline-none">
                        <option value="1.2">久坐 (無運動、辦公室工作)</option>
                        <option value="1.375">輕度 (每週運動 1-3 天)</option>
                        <option value="1.55">中度 (每週運動 3-5 天)</option>
                        <option value="1.725">重度 (每週運動 6-7 天)</option>
                    </select>
                </div>
                <div><label class="block text-[10px] mb-1 font-bold opacity-60">性別</label>
                    <select id="gender" class="w-full p-2.5 rounded-xl outline-none">
                        <option value="male">男性</option><option value="female">女性</option>
                    </select>
                </div>
                <div class="flex flex-col justify-end pb-1">
                    <div class="flex justify-between text-[11px] font-black"><span class="text-blue-500">BMI: <span id="bmiVal">--</span></span><span class="text-purple-500">TDEE: <span id="tdeeVal">--</span></span></div>
                </div>
                <div class="col-span-2">
                    <button onclick="saveUserDetail()" class="w-full mt-2 bg-blue-600 text-white py-3.5 rounded-xl font-black shadow-lg active:scale-95 transition">紀錄並更新數據</button>
                </div>
            </div>
        </div>

        <div class="card p-4 mb-6">
            <div class="flex justify-between items-center mb-2">
                <span id="modeBadge" class="text-[10px] px-2 py-0.5 rounded-full font-bold"></span>
                <span class="text-[10px] font-bold opacity-40">WEIGHT PROGRESS</span>
            </div>
            <div class="w-full bg-gray-100 dark:bg-gray-700 h-2.5 rounded-full overflow-hidden">
                <div id="weightProgressBar" class="progress-bar bg-gradient-to-r from-blue-500 to-indigo-600 h-full w-0"></div>
            </div>
        </div>

        <div class="card p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black text-sm">今日攝取狀態</h2>
                <span id="remainingCal" class="text-[10px] font-black px-3 py-1 rounded-full">--</span>
            </div>
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <div class="w-32 h-32 flex-shrink-0">
                    <canvas id="macroPieChart"></canvas>
                </div>
                <div class="flex-grow w-full">
                    <div class="w-full bg-gray-100 dark:bg-gray-700 h-2 rounded-full overflow-hidden mb-4">
                        <div id="calProgress" class="progress-bar bg-green-500 h-full w-0"></div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center">
                        <div class="bg-blue-50 dark:bg-blue-900/20 py-2 rounded-xl"><p class="text-[8px] font-bold text-blue-500">熱量</p><p id="totalCal" class="text-sm font-black">0</p></div>
                        <div class="bg-red-50 dark:bg-red-900/20 py-2 rounded-xl"><p class="text-[8px] font-bold text-red-500">蛋白</p><p id="totalP" class="text-sm font-black">0</p></div>
                        <div class="bg-green-50 dark:bg-green-900/20 py-2 rounded-xl"><p class="text-[8px] font-bold text-green-600">碳水</p><p id="totalC" class="text-sm font-black">0</p></div>
                        <div class="bg-yellow-50 dark:bg-yellow-900/20 py-2 rounded-xl"><p class="text-[8px] font-bold text-yellow-600">脂肪</p><p id="totalF" class="text-sm font-black">0</p></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card p-6 mb-6">
            <h2 class="text-xs font-black mb-4 opacity-50 uppercase tracking-widest text-gray-800 dark:text-gray-400">🍎 飲食與喝水紀錄</h2>
            <div id="foodBank" class="flex flex-wrap gap-2 mb-4 overflow-x-auto hide-scrollbar pb-1"></div>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <input id="foodName" type="text" placeholder="食物名稱" class="col-span-2 p-3 rounded-xl text-sm outline-none">
                <input id="pInput" type="number" placeholder="蛋白(g)" class="p-3 rounded-xl text-sm outline-none">
                <input id="cInput" type="number" placeholder="碳水(g)" class="p-3 rounded-xl text-sm outline-none">
                <input id="fInput" type="number" placeholder="脂肪(g)" class="p-3 rounded-xl text-sm outline-none">
                <button onclick="addWater(250)" class="p-3 rounded-xl text-xs font-black bg-cyan-500 text-white active:scale-95 transition">水 +250ml (<span id="waterText">0</span>)</button>
            </div>
            <button onclick="addEntry()" class="w-full bg-gray-900 dark:bg-blue-600 text-white py-3.5 rounded-xl font-black active:scale-95 transition">加入今日日誌</button>
        </div>

        <div class="card p-6 mb-6">
            <div id="aiAdviceContainer"></div>
            <div class="mt-4 border-t dark:border-gray-700 pt-4">
                <div class="flex justify-between items-center mb-4"><span class="text-xs font-bold opacity-60">今日明細</span><button onclick="clearAll()" class="text-[10px] text-red-500 font-bold">全部清空</button></div>
                <ul id="logList" class="space-y-3 max-h-[200px] overflow-y-auto pr-1"></ul>
            </div>
        </div>

        <div class="card p-5 mb-6">
            <h2 class="text-[10px] font-black opacity-40 mb-3 uppercase tracking-widest">📉 體重變化紀錄</h2>
            <div class="h-[150px]"><canvas id="weightChart"></canvas></div>
        </div>

        <div class="card p-5 mb-10">
            <h2 class="text-[10px] font-black opacity-40 mb-3 uppercase tracking-widest">🔥 熱量攝取趨勢 (7D)</h2>
            <div class="h-[150px]"><canvas id="trendChart"></canvas></div>
        </div>
    </div>

    <script>
        let historyData = JSON.parse(localStorage.getItem('dietV23')) || {};
        let weightHistory = JSON.parse(localStorage.getItem('weightV23')) || [];
        let userDetail = JSON.parse(localStorage.getItem('userV23')) || { gender:'male', age:25, weight:70, targetWeight:65, height:170, activity:1.2, tdee: 2000 };
        let today = new Date().toLocaleDateString();
        let logs = historyData[today]?.logs || [];
        let water = historyData[today]?.water || 0;
        let trendChart, weightChart, macroPieChart;

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('darkBtnIcon').innerText = isDark ? '☀️' : '🌙';
            location.reload(); 
        }

        function saveUserDetail() {
            ['weight','targetWeight','height','age','activity','gender'].forEach(id => {
                const el = document.getElementById(id);
                userDetail[id] = isNaN(parseFloat(el.value)) ? el.value : parseFloat(el.value);
            });
            let bmr = (10 * userDetail.weight) + (6.25 * userDetail.height) - (5 * userDetail.age);
            bmr = (userDetail.gender === 'male') ? bmr + 5 : bmr - 161;
            userDetail.tdee = Math.round(bmr * userDetail.activity);

            if(!weightHistory.length || weightHistory[weightHistory.length-1].date !== today) weightHistory.push({ date: today, val: userDetail.weight });
            else weightHistory[weightHistory.length-1].val = userDetail.weight;
            updateUI();
        }

        function updateUI() {
            const isGain = userDetail.targetWeight > userDetail.weight;
            const goalCal = isGain ? userDetail.tdee + 300 : userDetail.tdee - 500;
            const bmi = (userDetail.weight / ((userDetail.height/100)**2)).toFixed(1);

            document.getElementById('modeBadge').innerText = isGain ? "增肌模式 🥩" : "減脂模式 🔥";
            document.getElementById('modeBadge').className = `text-[10px] px-2 py-0.5 rounded-full font-bold ${isGain ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`;
            document.getElementById('tdeeVal').innerText = userDetail.tdee;
            document.getElementById('bmiVal').innerText = bmi;

            const startW = weightHistory[0]?.val || userDetail.weight;
            const totalProgress = Math.abs(startW - userDetail.targetWeight);
            const currentProgress = Math.abs(startW - userDetail.weight);
            document.getElementById('weightProgressBar').style.width = totalProgress === 0 ? '100%' : Math.min((currentProgress/totalProgress)*100, 100) + '%';

            let tCal = 0, tP = 0, tC = 0, tF = 0;
            const list = document.getElementById('logList');
            list.innerHTML = '';
            logs.forEach((item, index) => {
                const cal = (item.p*4) + (item.c*4) + (item.f*9);
                tCal += cal; tP += item.p; tC += item.c; tF += item.f;
                list.innerHTML += `<li class="flex justify-between items-center bg-gray-50 dark:bg-gray-800/50 p-3 rounded-xl"><span class="font-bold text-xs">${item.name}</span><span class="text-xs font-black text-blue-500">${Math.round(cal)} kcal <button onclick="deleteItem(${index})" class="ml-2 text-gray-400">✕</button></span></li>`;
            });

            document.getElementById('totalCal').innerText = Math.round(tCal);
            document.getElementById('totalP').innerText = Math.round(tP);
            document.getElementById('totalC').innerText = Math.round(tC);
            document.getElementById('totalF').innerText = Math.round(tF);
            document.getElementById('waterText').innerText = water;

            const remain = goalCal - tCal;
            document.getElementById('remainingCal').innerText = remain >= 0 ? `剩 ${Math.round(remain)}` : `超標 ${Math.abs(Math.round(remain))}`;
            document.getElementById('remainingCal').className = `text-[10px] font-black px-3 py-1 rounded-full ${remain >= 0 ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            document.getElementById('calProgress').style.width = Math.min((tCal/goalCal)*100, 100) + '%';

            // 更新圓餅圖
            const totalMacros = (tP * 4) + (tC * 4) + (tF * 9);
            if(totalMacros > 0) {
                macroPieChart.data.datasets[0].data = [Math.round((tP*4/totalMacros)*100), Math.round((tC*4/totalMacros)*100), Math.round((tF*9/totalMacros)*100)];
                macroPieChart.update();
            }

            // 更新趨勢圖
            const calData = []; const dayLabels = [];
            for(let i=6; i>=0; i--) {
                let d = new Date(); d.setDate(d.getDate() - i);
                calData.push(historyData[d.toLocaleDateString()]?.tCal || 0);
                dayLabels.push(d.getDate() + '日');
            }
            trendChart.data.labels = dayLabels; trendChart.data.datasets[0].data = calData;
            trendChart.data.datasets[1].data = new Array(7).fill(goalCal); trendChart.update();

            weightChart.data.labels = weightHistory.map(h => h.date.split('/')[2] + '日');
            weightChart.data.datasets[0].data = weightHistory.map(h => h.val);
            weightChart.update();

            historyData[today] = { logs, water, tCal };
            localStorage.setItem('dietV23', JSON.stringify(historyData));
            localStorage.setItem('weightV23', JSON.stringify(weightHistory));
            localStorage.setItem('userV23', JSON.stringify(userDetail));
        }

        function initCharts() {
            const isDark = document.documentElement.classList.contains('dark');
            const color = isDark ? '#94a3b8' : '#64748b';

            macroPieChart = new Chart(document.getElementById('macroPieChart'), {
                type: 'doughnut',
                data: { labels: ['蛋白', '碳水', '脂肪'], datasets: [{ data: [33, 33, 34], backgroundColor: ['#ef4444', '#22c55e', '#eab308'], borderWidth: 0 }] },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });

            const lineConfig = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x:{ grid:{display:false}, ticks:{color, font:{size:10}} }, y:{ grid:{color:isDark?'#334155':'#f1f5f9'}, ticks:{color, font:{size:10}} } } };
            
            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: { labels: [], datasets: [
                    { label: '攝取', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                    { label: '目標', data: [], borderColor: '#f43f5e', borderDash: [5, 5], pointRadius: 0 }
                ]},
                options: lineConfig
            });

            weightChart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: { labels: [], datasets: [{ label: 'kg', data: [], borderColor: '#8b5cf6', tension: 0.3, pointRadius: 4 }] },
                options: lineConfig
            });
        }

        function addEntry() {
            const n = document.getElementById('foodName').value || "食物";
            const p = parseFloat(document.getElementById('pInput').value) || 0;
            const c = parseFloat(document.getElementById('cInput').value) || 0;
            const f = parseFloat(document.getElementById('fInput').value) || 0;
            if(p+c+f > 0) { logs.push({name:n, p, c, f}); updateUI(); }
            ['foodName','pInput','cInput','fInput'].forEach(id => document.getElementById(id).value = '');
        }

        function addWater(a) { water += a; updateUI(); }
        function deleteItem(i) { logs.splice(i, 1); updateUI(); }
        function clearAll() { if(confirm("確定清空嗎？")) { logs = []; water = 0; updateUI(); } }

        window.onload = () => {
            ['weight','targetWeight','height','age','activity','gender'].forEach(id => {
                document.getElementById(id).value = userDetail[id] || '';
            });
            const commonFoods = [{ name: "雞胸肉", p: 31, c: 0, f: 3.6 }, { name: "白飯", p: 4, c: 60, f: 0.6 }, { name: "雞蛋", p: 7, c: 0.6, f: 5 }];
            const fb = document.getElementById('foodBank');
            commonFoods.forEach(f => {
                const s = document.createElement('div'); s.className = "food-chip shadow-sm";
                s.innerText = f.name; s.onclick = () => { logs.push({...f}); updateUI(); }; fb.appendChild(s);
            });
            initCharts(); updateUI();
        };
    </script>
</body>
</html>
